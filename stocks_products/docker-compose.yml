version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stocks_postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stocks_db}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock_user} -d ${POSTGRES_DB:-stocks_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  backend:
    build: .
    container_name: stocks_backend
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=0
      - DB_NAME=${POSTGRES_DB:-stocks_db}
      - DB_USER=${POSTGRES_USER:-stock_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - stocks_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn stocks_products.wsgi:application --bind 0.0.0.0:8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: stocks_nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stocks_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  stocks_network:
    driver: bridge